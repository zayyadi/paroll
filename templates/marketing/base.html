<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}PayNest payroll software for compliant payroll, tax workflows, and employee operations.{% endblock %}">
    <link rel="canonical" href="{% block canonical_url %}{{ request.build_absolute_uri }}{% endblock %}">
    <meta property="og:title" content="{% block og_title %}PayNest{% endblock %}">
    <meta property="og:description" content="{% block og_description %}PayNest payroll software for compliant payroll, tax workflows, and employee operations.{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <title>{% block title %}PayNest{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; color: #0f172a; background: #f8fafc; }
        .container { max-width: 960px; margin: 0 auto; padding: 24px; }
        .nav { background: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .nav a { margin-right: 16px; color: #1e293b; text-decoration: none; }
        .hero { background: linear-gradient(120deg, #e2e8f0, #f8fafc); border: 1px solid #e2e8f0; border-radius: 12px; padding: 32px; }
        .button { display: inline-block; padding: 10px 14px; border-radius: 8px; text-decoration: none; border: 1px solid #1d4ed8; }
        .button.primary { background: #1d4ed8; color: #ffffff; }
        .button.secondary { color: #1d4ed8; background: #ffffff; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin: 16px 0; }
        .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
        .field { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .messages { background: #dcfce7; border: 1px solid #86efac; color: #166534; padding: 10px; border-radius: 8px; margin-bottom: 14px; }
        footer { margin-top: 24px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container">
            <a href="{% url 'marketing:landing' %}"><strong>PayNest</strong></a>
            <a href="{% url 'marketing:pricing' %}">Pricing</a>
            <a href="{% url 'marketing:about' %}">About</a>
            <a href="{% url 'marketing:support' %}">Support</a>
            <a href="{% url 'marketing:security' %}">Security</a>
            <a href="{% url 'marketing:contact' %}">Contact</a>
            <a href="{% url 'users:register' %}">Start free trial</a>
        </div>
    </nav>

    <main class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="messages">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <a href="{% url 'marketing:privacy' %}">Privacy</a> |
        <a href="{% url 'marketing:terms' %}">Terms</a> |
        <a href="{% url 'marketing:cookies' %}">Cookies</a>
        <div>© 2026 PayNest</div>
    </footer>
</body>
</html>
