{% extends "base_auth_new.html" %}

{% block page_title_in_head %}<title>Password Changed - {{ APP_NAME }}</title>{% endblock %}

{% block auth_content %}
<div class="space-y-6 text-center">
    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-primary-50 text-primary-700">
        <i data-lucide="shield-check" class="h-7 w-7"></i>
    </div>

    <div>
        <p class="text-[10px] font-bold uppercase tracking-[0.28em] text-secondary-500">Account Security</p>
        <h2 class="mt-3 font-headline text-3xl font-extrabold text-primary-800">Password Changed</h2>
        <p class="mt-2 text-sm text-secondary-600">Your password has been updated successfully.</p>
    </div>

    <div class="flex flex-col gap-3 sm:flex-row sm:justify-center">
        <a href="{% url 'payroll:index' %}" class="btn-primary rounded-xl px-5 py-3 text-sm font-semibold text-white">
            Return to Dashboard
        </a>
        <a href="{% url 'users:login' %}" class="rounded-xl border border-secondary-200 bg-white px-5 py-3 text-sm font-semibold text-secondary-700 transition-colors hover:bg-secondary-50">
            Sign In Again
        </a>
    </div>
</div>
{% endblock %}
